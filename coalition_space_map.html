<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coalition Space — Sector Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --coal: #0a0c10;
    --ink: #0d1018;
    --panel: #141820;
    --panel-bright: #1c2230;
    --border: #242d3d;
    --border-bright: #3a4d6a;
    --text: #c8d0dc;
    --text-dim: #6a7888;
    --text-bright: #e8edf5;
    --accent: #e8a020;
    --accent-dim: #7a4a08;
    --accent-bright: #ffcc55;
    --red: #c03030;
    --red-dim: #601010;
    --green: #3a8a5a;
    --green-dim: #1a4a2a;
    --blue: #2a6aaa;
    --blue-bright: #4a9adf;
    --blue-dim: #0a2a4a;
    --purple: #7a4aaa;
    --scan: rgba(255,255,255,0.015);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--coal); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 300; }

  .app { display: flex; flex-direction: column; height: 100%; }

  /* HEADER */
  .map-header {
    flex-shrink: 0;
    border-top: 3px solid var(--accent);
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--ink);
    gap: 8px;
    z-index: 10;
  }
  .map-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-bright); white-space: nowrap; }
  .map-title span { color: var(--accent); }
  .map-subtitle { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-left: 14px; }
  .legend { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* MAP BODY */
  .map-body { flex: 1; display: flex; overflow: hidden; position: relative; }

  .map-canvas { flex: 1; position: relative; overflow: hidden; }
  .map-canvas::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scan) 2px, var(--scan) 4px); pointer-events: none; z-index: 2; }
  #star-bg { position: absolute; inset: 0; pointer-events: none; }
  #sector-map { width: 100%; height: 100%; }

  /* SVG */
  .grid-line { stroke: var(--border); stroke-width: 0.5; opacity: 0.5; }
  .grid-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; fill: #253245; letter-spacing: 0.06em; }
  .belt-dot { fill: #7a6030; opacity: 0.5; }
  .belt-dot.bright { fill: #c89040; opacity: 0.7; }
  .lane { stroke: #2a4060; stroke-width: 1; stroke-dasharray: 6 4; fill: none; opacity: 0.6; }
  .lane-label { font-family: 'Share Tech Mono', monospace; font-size: 8px; fill: #2a4060; letter-spacing: 0.08em; text-transform: uppercase; }
  .deep-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 300; font-size: 18px; fill: #182030; letter-spacing: 0.25em; text-transform: uppercase; pointer-events: none; user-select: none; }
  .hazard-label { font-family: 'Share Tech Mono', monospace; font-size: 8px; fill: #602020; letter-spacing: 0.1em; text-transform: uppercase; pointer-events: none; }
  .loc-group { cursor: pointer; }
  .loc-group:hover .loc-ring { opacity: 1; }
  .loc-group:hover .loc-label-text { fill: var(--accent-bright); }
  .loc-group:hover .loc-core { filter: url(#glow-accent); }
  .loc-ring { fill: none; stroke-width: 1; opacity: 0.4; animation: ring-pulse 3s ease-in-out infinite; }
  @keyframes ring-pulse { 0%,100%{opacity:0.2;stroke-width:1} 50%{opacity:0.7;stroke-width:1.5} }
  .loc-label-text { font-family: 'Share Tech Mono', monospace; font-size: 10px; fill: var(--text); letter-spacing: 0.06em; text-transform: uppercase; transition: fill 0.15s; pointer-events: none; user-select: none; }
  .loc-sublabel { font-family: 'Share Tech Mono', monospace; font-size: 8px; fill: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; pointer-events: none; user-select: none; }

  /* DETAIL PANEL — desktop right sidebar */
  .detail-panel {
    width: 0;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease;
    z-index: 20;
  }
  .detail-panel.open { width: 290px; }

  /* DETAIL PANEL — mobile bottom sheet */
  @media (max-width: 680px) {
    .detail-panel { position: absolute; bottom: 0; left: 0; right: 0; width: 100% !important; height: 0; border-left: none; border-top: 2px solid var(--accent); transition: height 0.3s ease; max-height: 65vh; }
    .detail-panel.open { height: 65vh; }
    .legend { display: none; }
    .map-subtitle { display: none; }
  }

  /* CLOSE BAR — top of panel, high contrast, impossible to miss */
  .panel-close-bar {
    flex-shrink: 0;
    background: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 16px;
    user-select: none;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .panel-close-bar:hover { background: var(--accent-bright); }
  .panel-close-bar:active { background: #c07010; }
  .close-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; font-weight: bold; letter-spacing: 0.18em; text-transform: uppercase; color: var(--coal); }
  .close-x { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; color: var(--coal); line-height: 1; }

  /* PANEL HEADER */
  .panel-header { flex-shrink: 0; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); background: var(--ink); }
  .panel-type { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 3px; }
  .panel-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 22px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-bright); line-height: 1.1; }
  .panel-coords { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; margin-top: 3px; }

  /* PANEL BODY */
  .panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; -webkit-overflow-scrolling: touch; }
  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-track { background: var(--panel); }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border-bright); }
  .panel-desc { font-size: 13px; line-height: 1.65; color: var(--text); margin-bottom: 14px; }
  .panel-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 14px; }
  .panel-stat { background: var(--panel-bright); border: 1px solid var(--border); padding: 7px 10px; }
  .pstat-label { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
  .pstat-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; color: var(--accent-bright); }
  .pstat-value.red { color: var(--red); }
  .pstat-value.blue { color: var(--blue-bright); }
  .pstat-value.green { color: var(--green); }
  .pstat-value.dim { color: var(--text-dim); }
  .panel-tags { margin-bottom: 12px; }
  .panel-tag { display: inline-block; font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 7px; border: 1px solid var(--border); color: var(--text-dim); margin: 0 4px 5px 0; }
  .panel-tag.accent { border-color: var(--accent-dim); color: var(--accent); }
  .panel-tag.red { border-color: var(--red-dim); color: var(--red); }
  .panel-tag.blue { border-color: var(--blue-dim); color: var(--blue-bright); }
  .panel-tag.green { border-color: var(--green-dim); color: var(--green); }
  .panel-tag.purple { border-color: #4a2a7a; color: #aa77dd; }

  .map-hint { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; pointer-events: none; white-space: nowrap; z-index: 3; opacity: 0.5; }

  .nav-link {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--coal);
    background: var(--accent);
    padding: 5px 12px;
    text-decoration: none;
    display: inline-block;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-link:hover { background: var(--accent-bright); }
</style>
</head>
<body>
<div class="app">
  <header class="map-header">
    <div style="display:flex;align-items:baseline;gap:4px;flex-wrap:wrap;">
      <div class="map-title">COALITION <span>SPACE</span></div>

        <div class="legend-item"><div class="legend-dot" style="background:#c03030"></div>CDF / Military</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3a8a5a"></div>Independent</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7a4aaa"></div>Union</div>
      </div>
    </div>
  </header>

  <div class="map-body">
    <div class="map-canvas" id="map-canvas" onclick="handleMapClick(event)">
      <canvas id="star-bg"></canvas>
      <svg id="sector-map" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice">
        <defs>
          <filter id="glow-accent" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <radialGradient id="belt-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#c89040" stop-opacity="0.08"/>
            <stop offset="100%" stop-color="#c89040" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
            <stop offset="60%" stop-color="transparent"/>
            <stop offset="100%" stop-color="#0a0c10" stop-opacity="0.65"/>
          </radialGradient>
        </defs>

        <!-- GRID -->
        <line class="grid-line" x1="100" y1="0" x2="100" y2="700"/><line class="grid-line" x1="200" y1="0" x2="200" y2="700"/>
        <line class="grid-line" x1="300" y1="0" x2="300" y2="700"/><line class="grid-line" x1="400" y1="0" x2="400" y2="700"/>
        <line class="grid-line" x1="500" y1="0" x2="500" y2="700"/><line class="grid-line" x1="600" y1="0" x2="600" y2="700"/>

        <line class="grid-line" x1="900" y1="0" x2="900" y2="700"/>
        <line class="grid-line" x1="0" y1="100" x2="1000" y2="100"/><line class="grid-line" x1="0" y1="200" x2="1000" y2="200"/>
        <line class="grid-line" x1="0" y1="300" x2="1000" y2="300"/><line class="grid-line" x1="0" y1="400" x2="1000" y2="400"/>
        <line class="grid-line" x1="0" y1="500" x2="1000" y2="500"/><line class="grid-line" x1="0" y1="600" x2="1000" y2="600"/>
        <text class="grid-label" x="96" y="12" text-anchor="middle">A</text><text class="grid-label" x="196" y="12" text-anchor="middle">B</text>
        <text class="grid-label" x="296" y="12" text-anchor="middle">C</text><text class="grid-label" x="396" y="12" text-anchor="middle">D</text>
        <text class="grid-label" x="496" y="12" text-anchor="middle">E</text><text class="grid-label" x="596" y="12" text-anchor="middle">F</text>
        <text class="grid-label" x="696" y="12" text-anchor="middle">G</text><text class="grid-label" x="796" y="12" text-anchor="middle">H</text>
        <text class="grid-label" x="896" y="12" text-anchor="middle">I</text>

        <text class="grid-label" x="10" y="304" dominant-baseline="middle">3</text><text class="grid-label" x="10" y="404" dominant-baseline="middle">4</text>
        <text class="grid-label" x="10" y="504" dominant-baseline="middle">5</text><text class="grid-label" x="10" y="604" dominant-baseline="middle">6</text>

        <!-- REGION LABELS -->

        <circle class="belt-dot bright" cx="483" cy="272" r="2.5"/><circle class="belt-dot" cx="500" cy="268" r="1.8"/>

<script>
const canvas = document.getElementById('star-bg');
function drawStars() {
  // Use getBoundingClientRect for accurate post-layout dimensions
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = Math.round(rect.width), h = Math.round(rect.height);
  if (!w || !h) return;
  // Only redraw if size actually changed
  if (canvas.width === w && canvas.height === h) return;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const count = Math.floor((w * h) / 1400);
  for (let i = 0; i < count; i++) {
    ctx.beginPath();
    ctx.arc(Math.random()*w, Math.random()*h, Math.random()*1.1, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${0.1 + Math.random()*0.45})`;
    ctx.fill();
  }
  for (let i = 0; i < 18; i++) {
    ctx.beginPath();
    ctx.arc(Math.random()*w, Math.random()*h, 1.4, 0, Math.PI*2);
    ctx.fillStyle = `rgba(210,225,255,0.7)`;
    ctx.fill();
  }
}
// Defer until layout is fully settled
requestAnimationFrame(() => requestAnimationFrame(drawStars));
window.addEventListener('resize', () => requestAnimationFrame(drawStars));

const locations = {

    desc: "Star Rat HQ. The common room board lists every crew ever recovered from this station. And separately, everyone who wasn't."

    type: 'Deep-Anchor Station', name: 'Port Amaranth', coords: 'F-4 / BELT INNER EDGE',
    tags: [['accent','Major Hub'],['blue','CDF Garrison'],['dim','Transit Junction']],
    stats: [{label:'Population',value:'~14,000',cls:''},{label:'Status',value:'Active',cls:'green'},{label:'CDF Presence',value:'Garrison',cls:'red'},{label:'Union Rating',value:'Recognized',cls:'blue'}],
    desc: "The commercial capital of Coalition Space. Sits at the junction of the Inner Transit Spine and the Belt approach corridors. Full shipyard, Coalition administrative offices, a CDF garrison, and a functioning court."
  },

  },
  'orvane': {
    type: 'Deep-Anchor Station', name: 'Waystation Orvane', coords: 'G-2 / BELT OUTER APPROACH',
    tags: [['accent','Waystation'],['blue','CDF Adjacent'],['accent','Exam Site']],
    stats: [{label:'Population',value:'~5,800',cls:''},{label:'Status',value:'Active',cls:'green'},{label:'CDF Presence',value:'Regular',cls:'red'},{label:'Union Rating',value:'Recognized',cls:'blue'}],
    desc: "Guards the outer approach to the Belt's northern arm. The Licensing Board holds examination briefings here twice a year. Produces more certified Lancers per capita than anywhere else in the region."
  },
  'coalition-hub': {

  },
  'assembly-dock': {

  },
};

function showLocation(id) {
  if (event) event.stopPropagation();
  const loc = locations[id];
  if (!loc) return;
  document.getElementById('panel-type').textContent = loc.type;
  document.getElementById('panel-name').textContent = loc.name;
  document.getElementById('panel-coords').textContent = loc.coords;
  let html = '';
  if (loc.tags?.length) {
    html += '<div class="panel-tags">';
    loc.tags.forEach(([cls, label]) => { html += `<span class="panel-tag ${cls}">${label}</span>`; });
    html += '</div>';
  }
  if (loc.stats?.length) {
    html += '<div class="panel-stats">';
    loc.stats.forEach(s => { html += `<div class="panel-stat"><div class="pstat-label">${s.label}</div><div class="pstat-value ${s.cls}">${s.value}</div></div>`; });
    html += '</div>';
  }
  if (loc.desc) html += `<p class="panel-desc">${loc.desc}</p>`;
  document.getElementById('panel-body').innerHTML = html;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('map-hint').style.display = 'none';
  // Redraw stars after panel animation settles
  setTimeout(() => { canvas.width = 0; requestAnimationFrame(drawStars); }, 280);
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('map-hint').style.display = '';
  setTimeout(() => { canvas.width = 0; requestAnimationFrame(drawStars); }, 280);
}

function handleMapClick(e) {
  if (e.target.closest('.loc-group')) return;
  closePanel();
}
</script>
